<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>PJ Plus Rakhi | Premium Handcrafted Traditions</title>
    <style>
        /* [ ... Existing CSS remains same ... ] */
        :root { --primary-color: #7A0016; --accent-gold: #E5A93C; --warm-shimmer: #F4E2C7; --teal-peacock: #007A78; --dark-velvet: #2A0006; --text-main: #3D2024; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
        body { background-color: var(--warm-shimmer); color: var(--text-main); min-height: 100vh; }
        
        /* New: WhatsApp Share Float Button */
        .whatsapp-share-float {
            position: fixed; bottom: 20px; left: 20px; background-color: #25D366; color: white;
            padding: 12px 20px; border-radius: 50px; font-weight: bold; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999; font-family: sans-serif; font-size: 0.9rem;
        }

        /* [ ... Keep all your existing CSS classes here ... ] */
        .nav-controls, .brand-logo-block, .hero-banner, .item-card, .dashboard-panel { /* ... rest of your CSS ... */ }
    </style>
</head>
<body>
    <!-- [ ... Keep your existing SVG background elements ... ] -->
    
    <header><!-- [ ... Keep existing header ... ] --></header>

    <!-- [ ... Keep hero-banner section ... ] -->

    <section class="main-showcase" id="collection">
        <h2 class="section-headline">Festive Highlights</h2>
        <div class="showcase-grid" id="catalogGrid"></div>
    </section>

    <!-- [ ... Keep Cart Drawer HTML ... ] -->

    <section class="dashboard-panel" id="ownerConsolePanel">
        <h2>Owner Inventory Control Station</h2>
        <form onsubmit="insertNewProductItem(event)">
            <div class="panel-inputs-row">
                <input type="text" id="addTitle" placeholder="Rakhi Name" required>
                <input type="number" id="addPrice" placeholder="Price" required>
                <input type="number" id="addOldPrice" placeholder="Crossed Price">
                <!-- Multi-image inputs -->
                <input type="text" id="addImg1" placeholder="Main Image URL" required>
                <input type="text" id="addImg2" placeholder="Image 2 URL">
                <input type="text" id="addImg3" placeholder="Image 3 URL">
                <input type="text" id="addImg4" placeholder="Image 4 URL">
                <input type="text" id="addImg5" placeholder="Image 5 URL">
                <select id="addTag"><option value="">No Label</option><option value="Bestseller">Bestseller</option></select>
                <button type="submit" class="dashboard-submit-btn">Publish Item</button>
            </div>
        </form>
    </section>

    <!-- WhatsApp Share Button -->
    <a href="https://wa.me/?text=Check out our premium Rakhi collection: https://yourwebsite.com" class="whatsapp-share-float" target="_blank">📱 Share Catalog</a>

    <script>
        // [ ... Keep existing data and helper functions ... ]

        function insertNewProductItem(event) {
            event.preventDefault();
            // Collect images into array
            const gallery = [
                document.getElementById('addImg1').value,
                document.getElementById('addImg2').value,
                document.getElementById('addImg3').value,
                document.getElementById('addImg4').value,
                document.getElementById('addImg5').value
            ].filter(url => url.trim() !== "");

            const newlyCreatedObj = {
                id: Date.now(),
                title: document.getElementById('addTitle').value,
                price: parseInt(document.getElementById('addPrice').value),
                oldPrice: document.getElementById('addOldPrice').value ? parseInt(document.getElementById('addOldPrice').value) : null,
                badge: document.getElementById('addTag').value,
                img: gallery[0], // First image is displayed
                gallery: gallery // Save all 5
            };

            globalCatalog.push(newlyCreatedObj);
            localStorage.setItem('pj_stored_inventory_data', JSON.stringify(globalCatalog));
            syncCatalogLayoutDisplay();
            alert("Item added successfully!");
        }

        // [ ... Keep the rest of your existing logic ... ]
    </script>
</body>
</html>
