<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>PJ Plus Rakhi | Premium Handcrafted Traditions</title>
    <style>
        :root {
            --primary-color: #7A0016;
            --accent-gold: #E5A93C;
            --warm-shimmer: #F4E2C7;
            --teal-peacock: #007A78;
            --dark-velvet: #2A0006;
            --text-main: #3D2024;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', 'Times New Roman', serif; }

        body {
            background-color: var(--warm-shimmer);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(229, 169, 60, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(122, 0, 22, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.6) 0%, rgba(244, 226, 199, 0.9) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-ticker { background-color: var(--primary-color); color: #FFFFFF; text-align: center; padding: 8px 10px; font-size: 0.85rem; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid var(--accent-gold); overflow: hidden; white-space: nowrap; }

        header { background-color: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(229, 169, 60, 0.3); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        
        .brand-title { font-size: 24px; font-weight: 800; color: var(--primary-color); }
        .brand-title span { color: var(--accent-gold); }
        
        .action-trigger-btn { background-color: var(--primary-color); color: white; border: 1px solid var(--accent-gold); padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; font-family: sans-serif; display: flex; align-items: center; gap: 6px; }

        .hero-banner { position: relative; background: linear-gradient(rgba(42, 0, 6, 0.82), rgba(122, 0, 22, 0.88)); color: white; text-align: center; padding: 70px 20px; border-bottom: 3px solid var(--accent-gold); }
        
        .main-showcase { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .showcase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .item-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(229, 169, 60, 0.3); border-radius: 12px; padding: 20px; text-align: center; }
        .item-tag { background: var(--primary-color); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-bottom: 10px; }
        .cart-action-btn { background-color: white; border: 2px solid var(--primary-color); color: var(--primary-color); padding: 8px 15px; width: 100%; border-radius: 20px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        .cart-slide-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 200; transition: right 0.4s; border-left: 4px solid var(--accent-gold); display: flex; flex-direction: column; }
        .cart-slide-drawer.active { right: 0; }
        .drawer-header { background: var(--primary-color); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .drawer-scroll-area { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .primary-action-btn { background-color: var(--teal-peacock); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-ticker">
        <marquee scrollamount="6">✨ PJ RAKHI HANDCRAFTED TRADITION — PREMIUM HANDCRAFTED RAKHIS ✨</marquee>
    </div>

    <header>
        <div class="nav-container">
            <div class="brand-title">PJ Plus <span>Rakhi</span></div>
            <button class="action-trigger-btn" onclick="toggleCartDrawer(true)">Cart Box <span id="globalCartCounter">0</span></button>
        </div>
    </header>

    <section class="hero-banner">
        <h1>Handcrafted Threads of Love</h1>
    </section>

    <section class="main-showcase" id="collection">
        <div class="showcase-grid" id="catalogGrid"></div>
    </section>

    <div class="cart-slide-drawer" id="checkoutDrawer">
        <div class="drawer-header">
            <h3>Your Shopping Box</h3>
            <button onclick="toggleCartDrawer(false)">Close</button>
        </div>
        <div class="drawer-scroll-area" id="drawerItemsWrap"></div>
        <div style="padding: 20px;">
            <button class="primary-action-btn" onclick="handleCheckoutProcessing()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        // ADD YOUR PRODUCTS HERE
        const globalCatalog = [
            { id: 1, title: "Royal Rakhi", price: 200, oldPrice: 230, badge: "Premium", img: "" }
        ];

        let dynamicCart = [];

        function syncCatalogLayoutDisplay() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            globalCatalog.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    ${item.badge ? `<span class="item-tag">${item.badge}</span>` : ''}
                    <h3>${item.title}</h3>
                    <p style="margin: 10px 0;">₹${item.price} ${item.oldPrice ? `<span style="text-decoration:line-through; color:#7D6B6D">₹${item.oldPrice}</span>` : ''}</p>
                    <button class="cart-action-btn" onclick="injectItemToCart(${item.id})">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }

        function toggleCartDrawer(status) {
            document.getElementById('checkoutDrawer').classList.toggle('active', status);
        }

        function injectItemToCart(itemId) {
            const item = globalCatalog.find(p => p.id === itemId);
            dynamicCart.push({ ...item, qty: 1 });
            document.getElementById('globalCartCounter').innerText = dynamicCart.length;
            toggleCartDrawer(true);
        }

        function handleCheckoutProcessing() {
            alert("Proceeding to WhatsApp checkout...");
        }

        syncCatalogLayoutDisplay();
    </script>
</body>
</html>
